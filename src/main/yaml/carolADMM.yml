incarnation: collektive

variables:
  maxCommDistance: &maxCommDistance 9.0
  connectWithinDistance: &connectWithinDistance 10.0
  robotSafeMargin: &robotSafeMargin 1.0
  robotMaxSpeed: &robotMaxSpeed 2.0
  primalTolerance: &primalTolerance 1e-2
  dualTolerance: &dualTolerance 1e-2
  maxIterations: &maxIter 50
  moveTargetTime1: &moveTargetTime1 20.0
  moveTargetTime2: &moveTargetTime2 40.0
  timeDistribution: &timeDistribution 100.0 # 10 ms
  obstacleRadius: &obstacleRadius 3.0
  obstacleMargin: &obstacleMargin 2.0

network-model:
  type: ConnectWithinDistance
  parameters: [*connectWithinDistance]

_pool: &program
  - time-distribution: *timeDistribution
    type: Event
    actions:
      - type: RunCollektiveProgram
        parameters: [ it.unibo.collektive.entrypoints.CommonTargetKt.commonTargetEntrypoint ]
      - type: SpeedToTarget
        parameters: []

environment:
  type: Continuous2DEnvironment
  parameters: [ ]
  global-programs:
    - time-distribution:
        type: Trigger
        parameters: [ *moveTargetTime1 ]
      type: MoveTarget
      parameters:
        - 15.0
        - 0.0
        - 1
    - time-distribution:
        type: Trigger
        parameters: [ *moveTargetTime2 ]
      type: MoveTarget
      parameters:
        - 0.0
        - 15.0
        - 1

deployments:
  - type: Point
    parameters: [ 0, 0 ]
    contents:
      - molecule: Robot
        concentration: true
      - molecule: MaxSpeed
        concentration: *robotMaxSpeed
      - molecule: SafeMargin
        concentration: *robotSafeMargin
      - molecule: TargetID
        concentration: 1
      - molecule: CommunicationDistance
        concentration: *maxCommDistance
      - molecule: PrimalTolerance
        concentration: *primalTolerance
      - molecule: DualTolerance
        concentration: *dualTolerance
      - molecule: MaxIterations
        concentration: *maxIter
      - molecule: TimeDistribution
        concentration: *timeDistribution
    programs:
      - *program
    properties:
      - type: it.unibo.collektive.alchemist.device.sensors.impl.LocationSensorProperty
      - type: it.unibo.collektive.alchemist.device.sensors.impl.TimeSensorProperty

  - type: Point
    parameters: [ 7, 0 ]
    contents:
      - molecule: Robot
        concentration: true
      - molecule: MaxSpeed
        concentration: *robotMaxSpeed
      - molecule: SafeMargin
        concentration: *robotSafeMargin
      - molecule: TargetID
        concentration: 1
      - molecule: CommunicationDistance
        concentration: *maxCommDistance
      - molecule: PrimalTolerance
        concentration: *primalTolerance
      - molecule: DualTolerance
        concentration: *dualTolerance
      - molecule: MaxIterations
        concentration: *maxIter
      - molecule: TimeDistribution
        concentration: *timeDistribution
    programs:
      - *program
    properties:
      - type: it.unibo.collektive.alchemist.device.sensors.impl.LocationSensorProperty
      - type: it.unibo.collektive.alchemist.device.sensors.impl.TimeSensorProperty
